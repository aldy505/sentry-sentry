name: self-hosted
on:
  push:
    branches:
      - master
      - releases/**
  pull_request:

# Cancel in progress workflows on pull_requests.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# hack for https://github.com/actions/cache/issues/810#issuecomment-1222550359
env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 3
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  self-hosted:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            platform: amd64
          - os: ubuntu-24.04-arm
            platform: arm64
    name: self-hosted-${{ matrix.os }}-${{ matrix.platform }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4
        id: setup-node
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@9b5745cdf0a2e8c2620f0746130f809adb911c19 # v4
      - uses: astral-sh/setup-uv@884ad927a57e558e7a70b92f2bccf9198a4be546 # v6
        with:
          version: '0.9.28'

      - uses: getsentry/action-setup-venv@5a80476d175edf56cb205b08bc58986fa99d1725 # v3.2.0
        with:
          cache-dependency-path: uv.lock
          # sentry.build.main has no external dependencies;
          # this is only to set up the venv with the correct
          # python version
          install-cmd: echo

      - name: Step configurations
        id: config
        run: |
          echo "webpack-path=.webpack_cache" >> "$GITHUB_OUTPUT"
          echo "WEBPACK_CACHE_PATH=.webpack_cache" >> "$GITHUB_ENV"

      - name: webpack cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ steps.config.outputs.webpack-path }}
          key: ${{ runner.os }}-self-hosted-webpack-cache-${{ hashFiles('rspack.config.ts', 'pnpm-lock.yaml', 'package.json') }}

      - name: node_modules cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        id: nodemodulescache
        with:
          path: node_modules
          key: ${{ runner.os }}-self-hosted-node-modules-${{ hashFiles('pnpm-lock.yaml', '.node-version') }}

      - name: Install Javascript Dependencies
        if: steps.nodemodulescache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile --production

      - run: |
          python3 -m tools.fast_editable --path .
          python3 -m sentry.build.main

      - uses: getsentry/action-build-and-push-images@07a1c835f7a78e0f438fc766cc6024ed0ca1bf03
        with:
          image_name: 'sentry'
          platforms: linux/${{ matrix.platform }}
          dockerfile_path: 'self-hosted/Dockerfile'
          tag_suffix: -${{ matrix.platform }}
          build_args: |
            SOURCE_COMMIT=${{ github.sha }}
            TARGETARCH=${{ matrix.platform }}
          ghcr: true
          tag_nightly: false
          tag_latest: false
          publish_on_pr: ${{ github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'MEMBER' }}

  assemble:
    needs: [self-hosted]
    if: ${{ (github.ref_name == 'master' || startsWith(github.ref_name, 'releases/')) && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Docker Login
        run: docker login --username '${{ github.actor }}' --password-stdin ghcr.io <<< "$GHCR_TOKEN"
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Create multiplatform manifests
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/getsentry/sentry:${{ github.sha }} \
            --tag ghcr.io/getsentry/sentry:nightly \
            ghcr.io/getsentry/sentry:${{ github.sha }}-amd64 \
            ghcr.io/getsentry/sentry:${{ github.sha }}-arm64

  # This job is to ensure database migration is correct to avoid any
  # InconsistentMigrationHistory issues when users upgrade to a new version of Sentry.
  upgrade-test:
    runs-on: ubuntu-24.04
    needs:
      - self-hosted
    strategy:
      fail-fast: false
      matrix:
        compose_profiles: ['feature-complete', 'errors-only']
    name: ${{ format('upgrade test{0}', matrix.compose_profiles == 'errors-only' && ' (errors-only)' || '') }}
    env:
      REPORT_SELF_HOSTED_ISSUES: 0
      SELF_HOSTED_TESTING_DSN: ${{ vars.SELF_HOSTED_TESTING_DSN }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        if: ${{ steps.filter.outputs.sentry == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter out changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            sentry:
              - 'src/sentry/migrations/**'
              - 'src/sentry/**/migrations/**'

      - name: Get latest release tag
        if: ${{ steps.filter.outputs.sentry == 'true' }}
        id: latest_release
        run: echo "tag=$(gh release list --json tagName,isLatest --jq '.[] | select(.isLatest)|.tagName')" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install latest release and run tests
        if: ${{ steps.filter.outputs.sentry == 'true' }}
        uses: getsentry/self-hosted@master
        with:
          skip_backup_restore_test: true
          compose_profiles: ${{ matrix.compose_profiles }}
          project_name: |-
            sentry
            snuba
            relay
            symbolicator
            taskbroker
            vroom
            uptime_checker
          image_url: |-
            ghcr.io/getsentry/sentry:${{ steps.latest_release.outputs.tag }}
            ghcr.io/getsentry/snuba:${{ steps.latest_release.outputs.tag }}
            ghcr.io/getsentry/relay:${{ steps.latest_release.outputs.tag }}
            ghcr.io/getsentry/symbolicator:${{ steps.latest_release.outputs.tag }}
            ghcr.io/getsentry/taskbroker:${{ steps.latest_release.outputs.tag }}
            ghcr.io/getsentry/vroom:${{ steps.latest_release.outputs.tag }}
            ghcr.io/getsentry/uptime-checker:${{ steps.latest_release.outputs.tag }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Re-run installation with nightly images and run tests
        if: ${{ steps.filter.outputs.sentry == 'true' }}
        uses: getsentry/self-hosted@master
        with:
          skip_backup_restore_test: true
          compose_profiles: ${{ matrix.compose_profiles }}
          project_name: |-
            sentry
            snuba
            relay
            symbolicator
            taskbroker
            vroom
            uptime_checker
          image_url: |-
            ghcr.io/getsentry/sentry:${{ github.sha }}-amd64
            ghcr.io/getsentry/snuba:nightly
            ghcr.io/getsentry/relay:nightly
            ghcr.io/getsentry/symbolicator:nightly
            ghcr.io/getsentry/taskbroker:nightly
            ghcr.io/getsentry/vroom:nightly
            ghcr.io/getsentry/uptime-checker:nightly
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
